name: release-wheels

# Builds the tetra3 Python wheel (tetra3-py, abi3 — one wheel covers all
# Python >= 3.8) for the Raspberry Pi (aarch64, Cortex-A53 tuned via the
# committed .cargo/config.toml) and attaches it to a GitHub release.
# Downstream consumers (diofinder) install it from the release URL.

on:
  push:
    tags: ["v*.*.*"]
  workflow_dispatch:
    # Version conventions:
    #   vX.Y.Z          -> full release (becomes "latest"; consumers pull it)
    #   vX.Y.Z-<suffix> -> PRErelease (e.g. v0.2.0-noext from a feature
    #                      branch; never becomes "latest" — select it
    #                      explicitly via diofinder's olive_solve_tag input
    #                      or OLIVE_SOLVE_TAG variable)
    #   *-dev           -> build only, no release
    # To build from a branch, pick that branch in the "Run workflow"
    # dropdown (or push a tag pointing at it).
    inputs:
      version:
        description: "Version tag (vX.Y.Z = release, vX.Y.Z-suffix = prerelease, *-dev = build only)"
        required: true
        default: "v0.0.0-dev"

jobs:
  build_aarch64:
    name: build aarch64 wheel (abi3)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      # PyO3's official maturin action. Handles the cross-compile toolchain
      # and linker config. The committed .cargo/config.toml scopes
      # target-cpu=cortex-a53 to the aarch64 target, so no extra flags here.
      - name: build wheel
        uses: PyO3/maturin-action@v1
        with:
          target: aarch64-unknown-linux-gnu
          manylinux: "2014"
          args: --release -m tetra3-py/Cargo.toml --interpreter python3.11

      - uses: actions/upload-artifact@v7
        with:
          name: wheel-aarch64
          path: target/wheels/*.whl
          if-no-files-found: error

  release:
    name: attach wheels to release
    needs: build_aarch64
    runs-on: ubuntu-latest
    if: >
      startsWith(github.ref, 'refs/tags/v') ||
      (github.event_name == 'workflow_dispatch' &&
       startsWith(github.event.inputs.version, 'v') &&
       !endsWith(github.event.inputs.version, '-dev'))
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6

      - uses: actions/download-artifact@v8
        with:
          path: dist
          merge-multiple: true

      - name: list wheels
        run: ls -la dist/

      - name: resolve tag name
        id: tag
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "name=${{ github.event.inputs.version }}" >> "$GITHUB_OUTPUT"
          else
            echo "name=${{ github.ref_name }}" >> "$GITHUB_OUTPUT"
          fi

      - name: create release with wheels
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ steps.tag.outputs.name }}
          files: dist/*.whl
          body: |
            ## Installation

            On a Raspberry Pi (aarch64, any Python >= 3.8 — the wheel is abi3):

            ```bash
            pip install $(curl -fsSL https://api.github.com/repos/${{ github.repository }}/releases/tags/${{ steps.tag.outputs.name }} | grep -o 'https://[^"]*\.whl' | head -1)
            ```
          generate_release_notes: true
          draft: false
          # Hyphenated versions (branch/test builds) are prereleases:
          # excluded from "latest", so consumers only get them when the
          # tag is selected explicitly.
          prerelease: ${{ contains(steps.tag.outputs.name, '-') }}
